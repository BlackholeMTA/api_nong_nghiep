services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: kim-son-agriculture-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-kim_son_agriculture}
      POSTGRES_USER: ${DATABASE_USER:-kim_son_dev}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change_me_for_local_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
